name: Bug report
description: Report a reproducible AI Agent Resume Guard problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, files, or inputs needed to reproduce.
      placeholder: |
        agent-resume-guard init
        agent-resume-guard ingest --adapter-export examples/multi-lineage-adapter-export.json
        agent-resume-guard doctor
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AI Agent Resume Guard version
      placeholder: agent-resume-guard 0.1.0
    validations:
      required: true
  - type: textarea
    id: public_sample
    attributes:
      label: Sanitized sample
      description: Include only synthetic or sanitized manifest/handoff content.
    validations:
      required: false
