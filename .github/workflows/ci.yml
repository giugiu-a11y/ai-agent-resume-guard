name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest
      - run: python -m compileall -q src tests
      - run: bash scripts/privacy_check.sh
      - run: python -m build
      - run: python -m twine check dist/*
      - run: agent-resume-guard --version
      - run: agent-resume-guard --root /tmp/agent-resume-guard-ci init --force
      - run: agent-resume-guard --root /tmp/agent-resume-guard-ci ingest --adapter-export examples/multi-lineage-adapter-export.json
      - run: agent-resume-guard --root /tmp/agent-resume-guard-ci pick-session --format json | python -c 'import json,sys; payload=json.load(sys.stdin); assert payload["selected_root_session_id"] == "20260417_busy_root"'
      - run: agent-resume-guard --root /tmp/agent-resume-guard-ci doctor --format json | python -c 'import json,sys; payload=json.load(sys.stdin); assert payload["ok"] is True; assert payload["context_dir"] == ".agent-resume"'
      - run: bash scripts/prepublish_check.sh
